<!-- ══ HOME / LANDING ══════════════════════════════════════════════════════ -->
<app-home
  *ngIf="mode === 'home'"
  (selectMode)="onSelectMode($event)">
</app-home>

<!-- ══ WIZARD (MCQ + DQ) ══════════════════════════════════════════════════ -->
<div *ngIf="mode !== 'home'"
  class="min-h-screen bg-background text-textPrimary py-4 sm:py-8 px-3 sm:px-4 flex flex-col items-center font-sans">

  <!-- HEADER -->
  <header class="w-full max-w-5xl mb-5 sm:mb-8 flex flex-col pt-2 sm:pt-4">
    <!-- Back to Home -->
    <div class="mb-3">
      <button (click)="onReset()"
        class="flex items-center gap-1.5 text-xs text-textMuted hover:text-textPrimary border border-gray-300 hover:border-gray-400 bg-surface hover:bg-gray-50 px-3 py-1.5 rounded transition-all">
        ← Home
      </button>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-textPrimary leading-tight">
          <ng-container *ngIf="mode === 'mcq'">MCQ Bulk Processor</ng-container>
          <ng-container *ngIf="mode === 'dq'">Decision &amp; Quiz Processor</ng-container>
        </h1>
        <p class="text-textMuted mt-1 text-xs sm:text-sm">Convert → Preview → Parse → Export</p>
      </div>
      <div class="flex items-center gap-3">
        <!-- Mode badge -->
        <span
          class="px-2.5 py-1 rounded text-xs font-semibold"
          [ngClass]="mode === 'dq'
            ? 'bg-purple-100 border border-purple-300 text-purple-700'
            : 'bg-blue-100 border border-blue-300 text-blue-700'">
          {{ mode === 'dq' ? '⬡ Decision & Quiz' : '✦ Other (MCQ)' }}
        </span>
        <div class="bg-amber-50 border border-amber-200 px-2.5 py-1 rounded text-xs text-amber-700 flex items-center space-x-2">
          <span class="w-2 h-2 rounded-full bg-warning inline-block flex-shrink-0"></span>
          <span>Stateless · No Data Stored</span>
        </div>
      </div>
    </div>

    <!-- Step Progress Bar -->
    <div class="flex items-center mt-4 sm:mt-6 gap-1 sm:gap-2 overflow-x-auto pb-1">
      <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0" *ngFor="let s of [1, 2, 3]; let i = index">
        <div
          class="flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full text-xs sm:text-sm font-bold border-2 transition-colors flex-shrink-0"
          [ngClass]="{
            'bg-primary border-primary text-white': currentStep === s,
            'bg-green-600 border-green-600 text-white': currentStep > s,
            'bg-white border-gray-300 text-textMuted': currentStep < s
          }">
          <span *ngIf="currentStep <= s">{{s}}</span>
          <span *ngIf="currentStep > s">✓</span>
        </div>
        <span class="text-xs font-medium whitespace-nowrap"
          [ngClass]="currentStep === s ? 'text-textPrimary font-semibold' : 'text-textMuted'">
          {{ s === 1 ? 'Paste & Convert' : s === 2 ? 'Preview & Parse' : 'Export' }}
        </span>
        <div *ngIf="i < 2" class="w-6 sm:w-12 h-px bg-gray-200 mx-0.5 sm:mx-1 flex-shrink-0"></div>
      </div>
    </div>
  </header>

  <!-- GLOBAL ERROR BANNER -->
  <div *ngIf="errorMsg" class="w-full max-w-5xl mb-4 bg-red-50 text-red-700 px-4 py-3 rounded border border-red-200 text-sm flex items-center gap-2">
    ❌ {{errorMsg}}
    <button (click)="errorMsg = null" class="ml-auto text-xs text-red-400 hover:text-red-700">✕</button>
  </div>

  <main class="w-full max-w-5xl space-y-6">

    <!-- STEP 1: Convert -->
    <app-step1-convert
      *ngIf="currentStep === 1"
      [isLoading]="isLoading"
      (convert)="onConvert($event)">
    </app-step1-convert>

    <!-- STEP 2: Preview + Parse -->
    <app-step2-preview
      *ngIf="currentStep === 2"
      [questions]="convertedQuestions"
      [mode]="mode"
      [isLoading]="isLoading"
      (parse)="onParse($event)"
      (back)="onBackToInput()">
    </app-step2-preview>

    <!-- STEP 3: Final table + Export -->
    <app-step3-export
      *ngIf="currentStep === 3"
      [mode]="mode"
      [questions]="flatQuestions"
      [dqQuestions]="flatDQQuestions"
      (export)="onExport()"
      (back)="onBackToPreview()"
      (reset)="onReset()">
    </app-step3-export>

  </main>
</div>
