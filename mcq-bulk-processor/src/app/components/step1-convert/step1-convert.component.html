<form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-surface rounded-lg shadow-lg border border-gray-800 p-4 sm:p-6 flex flex-col gap-4 sm:gap-6">

  <div>
    <label class="text-textPrimary font-semibold text-sm mb-2 block">Paste Raw Questions Here *</label>
    <textarea
      formControlName="rawText"
      class="w-full bg-[#0b0c10] text-[#e2e8f0] border border-gray-700 rounded p-3 sm:p-4 font-mono text-base leading-6 resize-y focus:outline-none focus:border-primary transition-colors min-h-[280px] sm:min-h-[340px]"
      placeholder="Q1. What is 2+2?&#10;A) 1&#10;B) 2&#10;C) 4&#10;D) 5&#10;✅ Ans: C&#10;&#10;Q2. ...">
    </textarea>
    <div class="flex justify-between mt-1 px-1">
      <span class="text-xs text-error" *ngIf="form.get('rawText')?.invalid && form.get('rawText')?.touched">
        Minimum 10 characters required.
      </span>
      <span class="text-xs text-textMuted ml-auto font-mono">{{ charCount | number }} / ~40,000</span>
    </div>
  </div>

  <div class="flex justify-end pt-2 border-t border-gray-800">
    <button
      type="submit"
      [disabled]="form.invalid || isLoading"
      class="w-full sm:w-auto bg-primary hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-400 text-white font-bold py-3 px-8 rounded flex items-center justify-center gap-2 transition-all shadow-md">
      <ng-container *ngIf="!isLoading">⚡ Convert Questions</ng-container>
      <ng-container *ngIf="isLoading">
        <mat-spinner diameter="20" color="accent"></mat-spinner>&nbsp;Converting...
      </ng-container>
    </button>
  </div>

</form>
