<div class="home-wrapper">

      <p class="home-sub">Choose the question type you want to process</p>

    <div class="cards-grid">

      <!-- Card 1: Other (MCQ) -->
      <button class="mode-card card-mcq" (click)="selectMode.emit('mcq')" id="btn-mode-mcq">
        <div class="card-icon-wrap icon-blue">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">

        <p class="card-desc">

        <div class="card-pills">
          <span class="pill pill-blue">POST /convert</span>
          <span class="pill pill-blue">POST /parse</span>
          <span class="pill pill-blue">GET /export</span>
        </div>
        <span class="card-arrow">→</span>
      </button>

      <!-- Card 2: Decision & Quiz -->
      <button class="mode-card card-dq" (click)="selectMode.emit('dq')" id="btn-mode-dq">

            <circle cx="18" cy="9" r="2.5" fill="#a78bfa"/>
            <circle cx="11" cy="24" r="2.5" fill="#a78bfa"/>

            <rect x="22" y="6" width="11" height="6" rx="3" fill="#a78bfa" fill-opacity="0.25"/>
            <text x="27.5" y="10.6" text-anchor="middle" font-size="4.2" fill="#a78bfa" font-family="sans-serif" font-weight="700">DQ</text>

        <h2 class="card-title">Decision &amp; Quiz</h2>
        <p class="card-desc">
          Questions with auto-extracted <strong>Title</strong> &amp; <strong>Explanation</strong>.<br>
          13-column Excel output.
        </p>
        <div class="card-pills">
          <span class="pill pill-purple">POST /convert/dq</span>
          <span class="pill pill-purple">POST /parse/dq</span>
          <span class="pill pill-purple">GET /export/dq</span>
        </div>
        <span class="card-arrow">→</span>
      </button>

    </div><!-- /cards-grid -->

    <!-- Footer note -->
    <p class="home-footer">
      <span class="dot dot-yellow"></span>
      Stateless · No data stored on server
    </p>

  </div><!-- /home-content -->
